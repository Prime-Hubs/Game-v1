<meta charset="UTF-8">

<title>FLOW — Minimal Survival</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root {
  --white: #FFFFFF;
  --gray-50: #F5F5F5;
  --gray-100: #EAEAEA;
  --black: #111111;
  --dark: #333333;
  --shadow: 0 8px 24px rgba(0,0,0,0.06);
  --radius: 20px;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body {
  font-family:'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--white);
  color: var(--black);
  -webkit-font-smoothing: antialiased;
  transition: background 0.4s ease;
  touch-action: none;
}
body.theme-gray { background: var(--gray-50); }

.glass {
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--gray-100);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}

.app { position:relative; width:100%; height:100%; }

.top-bar {
  position: fixed;
  top: 20px; left: 50%;
  transform: translateX(-50%);
  width: min(720px, calc(100% - 32px));
  display: flex; justify-content: space-between; align-items: flex-end;
  padding: 18px 26px;
  z-index: 20;
  will-change: transform;
}
.top-bar.pulse { animation: beat 0.545s ease-in-out infinite; }
@keyframes beat {
  0%, 100% { transform: translateX(-50%) scale(1); }
  50% { transform: translateX(-50%) scale(1.02); }
}
.label {
  font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--dark); font-weight: 500; margin-bottom: 4px; opacity: 0.7;
}
.score {
  font-size: 36px; font-weight: 600; letter-spacing: -0.02em; line-height: 1;
  color: var(--black); font-variant-numeric: tabular-nums;
}
.combo-wrap { text-align: right; }
.combo {
  font-size: 26px; font-weight: 500; line-height: 1;
  color: var(--dark); font-variant-numeric: tabular-nums; margin-top: 2px;
  transition: opacity 0.3s;
}

.game-container {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  padding: 110px 16px 130px;
}
#game {
  width: min(720px, 100%); height: 100%; max-height: 68vh;
  background: var(--white);
  border: 1px solid var(--gray-100);
  border-radius: var(--radius);
  box-shadow: 0 4px 24px rgba(0,0,0,0.04);
  display: block;
  touch-action: none;
}

.controls {
  position: fixed; bottom: 20px; left: 50%;
  transform: translateX(-50%);
  width: min(720px, calc(100% - 32px));
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px;
  z-index: 20;
}
.btn {
  appearance: none; border: none; background: transparent;
  width: 44px; height: 44px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  color: var(--dark); cursor: pointer;
  transition: all 0.3s ease; flex-shrink: 0;
}
.btn:hover { background: rgba(0,0,0,0.04); transform: scale(1.02); }
.btn:active { transform: scale(0.98); }
.btn.primary {
  width: auto; padding: 0 18px; gap: 8px;
  background: var(--black); color: var(--white);
  font-size: 14px; font-weight: 500; letter-spacing: 0.01em;
}
.btn.primary:hover { background: var(--dark); }
.btn svg { width: 18px; height: 18px; stroke-width: 1.75; }

.separator { width: 1px; height: 24px; background: var(--gray-100); margin: 0 4px; }

input[type=range] {
  -webkit-appearance: none; width: 100px; height: 24px;
  background: transparent; cursor: pointer;
}
input[type=range]::-webkit-slider-runnable-track {
  height: 4px; background: var(--gray-100); border-radius: 2px;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 16px; height: 16px;
  background: var(--black); border-radius: 50%; margin-top: -6px;
  transition: transform 0.2s;
}
input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.15); }
input[type=range]::-moz-range-track { height: 4px; background: var(--gray-100); border-radius: 2px; border: none; }
input[type=range]::-moz-range-thumb { width: 16px; height: 16px; background: var(--black); border-radius: 50%; border: none; }

.overlay {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  z-index: 30;
  background: rgba(0,0,0,0.04);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  opacity: 1; transition: opacity 0.3s ease; pointer-events: auto;
}
.overlay.hidden { opacity: 0; pointer-events: none; }

.panel {
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--gray-100);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 36px 40px;
  width: min(340px, calc(100% - 48px));
  text-align: center;
}
.panel h2 { font-size: 22px; font-weight: 600; letter-spacing: -0.01em; margin-bottom: 8px; color: var(--black); }
.panel p { font-size: 14px; color: var(--dark); opacity: 0.8; line-height: 1.5; margin-bottom: 24px; }
.panel .final-score { font-size: 48px; font-weight: 600; letter-spacing: -0.02em; margin: 12px 0 8px; color: var(--black); font-variant-numeric: tabular-nums; }
.panel .btn-row { display: flex; gap: 10px; justify-content: center; margin-top: 8px; }
.panel .btn { background: var(--gray-100); width: auto; padding: 0 18px; height: 40px; font-size: 14px; font-weight: 500; }
.panel .btn.primary { background: var(--black); color: white; }

.leader-list { text-align: left; margin: 20px 0 4px; }
.leader-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 0; border-bottom: 1px solid var(--gray-100); font-size: 14px;
}
.leader-item:last-child { border-bottom: none; }
.leader-rank { color: var(--dark); opacity: 0.6; width: 24px; }
.leader-score { font-variant-numeric: tabular-nums; font-weight: 500; }

@media (max-width: 640px) {
  .top-bar { padding: 14px 20px; top: 12px; }
  .score { font-size: 30px; }
  .combo { font-size: 22px; }
  .controls { gap: 6px; padding: 10px 12px; bottom: 12px; }
  input[type=range] { width: 70px; }
  .panel { padding: 28px 24px; }
  .game-container { padding: 90px 12px 110px; }
}
</style>
</head>

<div class="app">
  <header class="top-bar glass" id="topBar">
    <div class="score-wrap">
      <div class="label">Score</div>
      <div id="score" class="score">0</div>
    </div>
    <div class="combo-wrap">
      <div class="label">Flow</div>
      <div id="combo" class="combo">×1</div>
    </div>
  </header>

  <main class="game-container">
    <canvas id="game"></canvas>
    
    <div id="pauseOverlay" class="overlay hidden">
      <div class="panel">
        <h2>Paused</h2>
        <p>Take a breath. Flow resumes when ready.</p>
        <div class="btn-row">
          <button id="resumeBtn" class="btn primary"><i data-lucide="play"></i> Resume</button>
        </div>
      </div>
    </div>

    <div id="gameOverOverlay" class="overlay hidden">
      <div class="panel">
        <h2>Flow Ended</h2>
        <div class="final-score" id="finalScore">0</div>
        <p id="finalMult">Best flow ×1</p>
        <div class="leader-list" id="miniLeader"></div>
        <div class="btn-row">
          <button id="retryBtn" class="btn primary"><i data-lucide="rotate-ccw"></i> Retry</button>
        </div>
      </div>
    </div>

    <div id="leaderOverlay" class="overlay hidden">
      <div class="panel">
        <h2>Top Flows</h2>
        <p>Your best 5 runs, saved locally.</p>
        <div class="leader-list" id="fullLeader"></div>
        <div class="btn-row">
          <button id="closeLeader" class="btn">Close</button>
        </div>
      </div>
    </div>
  </main>

  <footer class="controls glass">
    <button id="playBtn" class="btn primary"><i data-lucide="play"></i><span>Play</span></button>
    <button id="restartBtn" class="btn" aria-label="Restart"><i data-lucide="rotate-ccw"></i></button>
    <div class="separator"></div>
    <button id="audioBtn" class="btn" aria-label="Audio"><i data-lucide="volume-x"></i></button>
    <input id="volume" type="range" min="0" max="100" value="20" aria-label="Volume">
    <div class="separator"></div>
    <button id="themeBtn" class="btn" aria-label="Theme"><i data-lucide="contrast"></i></button>
    <button id="leaderBtn" class="btn" aria-label="Leaderboard"><i data-lucide="trophy"></i></button>
  </footer>
</div>

<script>
// FLOW - Minimal Survival
class AudioManager {
  constructor() {
    this.ctx = null; this.master = null; this.playing = false;
    this.volume = 0.2; this.osc1 = null; this.osc2 = null;
  }
  init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.master = this.ctx.createGain();
    this.master.gain.value = this.volume * 0.3;
    this.master.connect(this.ctx.destination);
  }
  startPad() {
    this.init();
    if (this.playing) return;
    if (this.ctx.state === 'suspended') this.ctx.resume();
    const filter = this.ctx.createBiquadFilter();
    filter.type = 'lowpass'; filter.frequency.value = 820; filter.Q.value = 0.7;
    filter.connect(this.master);
    const padGain = this.ctx.createGain(); padGain.gain.value = 0; padGain.connect(filter);
    padGain.gain.linearRampToValueAtTime(0.035, this.ctx.currentTime + 1.4);
    this.osc1 = this.ctx.createOscillator(); this.osc1.type = 'sine'; this.osc1.frequency.value = 220; this.osc1.connect(padGain);
    this.osc2 = this.ctx.createOscillator(); this.osc2.type = 'sine'; this.osc2.frequency.value = 329.63; this.osc2.detune.value = -5;
    const g2 = this.ctx.createGain(); g2.gain.value = 0.55; this.osc2.connect(g2); g2.connect(padGain);
    this.osc1.start(); this.osc2.start();
    this.padGain = padGain; this.playing = true;
    this.startBeat();
  }
  stopPad() {
    if (!this.playing) return;
    this.padGain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.35);
    setTimeout(() => { try { this.osc1.stop(); this.osc2.stop(); } catch {} }, 400);
    this.playing = false; this.stopBeat();
  }
  toggle() { if (this.playing) this.stopPad(); else this.startPad(); return this.playing; }
  setVolume(v) { this.volume = v/100; if (this.master) this.master.gain.linearRampToValueAtTime(this.volume * 0.3, this.ctx.currentTime + 0.05); }
  playClick() {
    this.init(); const o = this.ctx.createOscillator(); const g = this.ctx.createGain();
    o.type='sine'; o.frequency.value=800; o.frequency.exponentialRampToValueAtTime(620, this.ctx.currentTime+0.07);
    g.gain.value=0; g.gain.linearRampToValueAtTime(0.07*this.volume, this.ctx.currentTime+0.01);
    g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime+0.09);
    o.connect(g); g.connect(this.master); o.start(); o.stop(this.ctx.currentTime+0.1);
  }
  playHit() {
    this.init(); const o = this.ctx.createOscillator(); const g = this.ctx.createGain();
    o.type='triangle'; o.frequency.value=120; o.frequency.exponentialRampToValueAtTime(58, this.ctx.currentTime+0.22);
    g.gain.value=0; g.gain.linearRampToValueAtTime(0.16*this.volume, this.ctx.currentTime+0.01);
    g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime+0.26);
    o.connect(g); g.connect(this.master); o.start(); o.stop(this.ctx.currentTime+0.27);
  }
  startBeat() { document.getElementById('topBar').classList.add('pulse'); }
  stopBeat() { document.getElementById('topBar').classList.remove('pulse'); }
}

class Player {
  constructor() { this.radius = 9; this.x = 0; this.y = 0; this.targetX = 0; this.vx = 0; }
  reset(w, h) { this.x = w/2; this.targetX = w/2; this.y = h - 42; this.vx = 0; }
  update(delta, bounds) {
    this.vx += (this.targetX - this.x) * 0.18;
    this.vx *= 0.82;
    this.x += this.vx * (delta/16);
    const min = this.radius + 8, max = bounds.width - this.radius - 8;
    this.x = Math.max(min, Math.min(max, this.x));
    this.targetX = Math.max(min, Math.min(max, this.targetX));
  }
  draw(ctx) {
    ctx.save();
    ctx.fillStyle = '#111111';
    ctx.shadowColor = 'rgba(0,0,0,0.08)'; ctx.shadowBlur = 14; ctx.shadowOffsetY = 4;
    ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

class Obstacle {
  constructor(x, y, w, h, speed) { this.x=x; this.y=y; this.w=w; this.h=h; this.speed=speed; this.near=false; }
  update(delta) { this.y += this.speed * (delta/16); }
  draw(ctx) {
    ctx.save();
    ctx.fillStyle = '#EAEAEA'; ctx.strokeStyle = '#333333'; ctx.lineWidth = 1;
    ctx.beginPath();
    const r = 10;
    if (ctx.roundRect) { ctx.roundRect(this.x, this.y, this.w, this.h, r); }
    else { ctx.rect(this.x, this.y, this.w, this.h); }
    ctx.fill(); ctx.stroke();
    ctx.restore();
  }
  collides(p) {
    const cx = Math.max(this.x, Math.min(p.x, this.x + this.w));
    const cy = Math.max(this.y, Math.min(p.y, this.y + this.h));
    const dx = p.x - cx, dy = p.y - cy;
    return (dx*dx + dy*dy) < (p.radius * p.radius);
  }
  checkNear(p) {
    if (this.near) return false;
    const centerX = this.x + this.w/2;
    const distX = Math.abs(p.x - centerX);
    const threshold = this.w/2 + p.radius + 18;
    const vertical = Math.abs((this.y + this.h/2) - p.y) < 36;
    if (distX < threshold && distX > this.w/2 + p.radius - 1 && vertical && this.y < p.y && this.y + this.h > p.y - 30) {
      this.near = true; return true;
    }
    return false;
  }
}

class Game {
  constructor(canvas) {
    this.canvas = canvas; this.ctx = canvas.getContext('2d');
    this.dpr = Math.min(window.devicePixelRatio || 1, 2);
    this.width = 0; this.height = 0;
    this.player = new Player();
    this.obstacles = []; this.particles = [];
    this.running = false; this.paused = false; this.over = false;
    this.score = 0; this.displayScore = 0; this.combo = 0; this.multiplier = 1;
    this.time = 0; this.speed = 2.2; this.lastSpawn = 0; this.spawnRate = 900;
    this.shake = 0; this.lastTime = 0;
    this.audio = null; this.ui = null;
    this.resize(); window.addEventListener('resize', () => this.resize());
    this.bindInput(); this.loop(0);
  }
  setAudio(a){ this.audio = a; }
  setUI(u){ this.ui = u; }
  resize() {
    const r = this.canvas.getBoundingClientRect();
    this.width = r.width; this.height = r.height;
    this.canvas.width = this.width * this.dpr; this.canvas.height = this.height * this.dpr;
    this.ctx.setTransform(this.dpr,0,0,this.dpr,0,0);
    this.player.reset(this.width, this.height);
  }
  bindInput() {
    const set = (x) => {
      const rect = this.canvas.getBoundingClientRect();
      this.player.targetX = (x - rect.left) * (this.width / rect.width);
    };
    this.canvas.addEventListener('pointerdown', e => { set(e.clientX); this.canvas.setPointerCapture(e.pointerId); });
    this.canvas.addEventListener('pointermove', e => { if (
